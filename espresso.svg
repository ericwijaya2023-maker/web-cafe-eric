<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg_espresso" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A00" />
      <stop offset="100%" style="stop-color:#3C1A00" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)" />
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)" />
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.1)" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="rgba(255,255,255,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg_espresso)" rx="16"/>

  <!-- Overlay shine -->
  <rect width="600" height="400" fill="url(#shine)" rx="16"/>

  <!-- Decorative circles -->
  <circle cx="520" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="80" cy="350" r="100" fill="rgba(0,0,0,0.05)"/>
  <circle cx="500" cy="350" r="60" fill="rgba(255,255,255,0.03)"/>

  <!-- Icon with glow -->
  <g filter="url(#glow)">
    <text x="300" y="160" font-size="100" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">☕</text>
  </g>

  <!-- Nama menu -->
  <text x="300" y="240" font-family="Segoe UI, system-ui, sans-serif" font-size="32" font-weight="800"
    fill="white" text-anchor="middle" filter="url(#shadow)">Espresso</text>

  <!-- Kategori -->
  <text x="300" y="268" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600"
    fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">MINUMAN</text>

  <!-- Deskripsi -->
  <text x="300" y="300" font-family="Segoe UI, system-ui, sans-serif" font-size="14"
    fill="rgba(255,255,255,0.6)" text-anchor="middle">Espresso shot double dengan crema sempurna.</text>

  <!-- Badge -->
  <g transform="translate(300, 340)">
    <rect x="-60" y="-14" width="120" height="28" rx="14" fill="rgba(255,255,255,0.2)"/>
    <text x="0" y="4" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700"
      fill="white" text-anchor="middle">Strong</text>
  </g>
</svg>